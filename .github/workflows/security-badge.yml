---
name: Refresh grype_me Security Badges

on:
  schedule:
    - cron: '0 8 * * *' # every day at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Ensure required secrets and variables are set
        shell: bash
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ vars.GRYPE_BADGE_GIST_ID }}
        run: |
          set -euo pipefail
          if [[ -z "$GIST_TOKEN" ]]; then
            echo "Missing required secret: GIST_TOKEN" >&2
            exit 1
          fi
          if [[ -z "$GIST_ID" ]]; then
            echo "Missing required repository variable: GRYPE_BADGE_GIST_ID" >&2
            exit 1
          fi

      - name: Checkout repository (with tags)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # fetch-depth: 0 (non-default) - fetch full history to ensure tag lookups work correctly
          fetch-depth: 0
          # fetch-tags: true (non-default) - need tags to detect latest_release for the badge
          fetch-tags: true

      - name: Scan latest release of GitHub Action
        id: grype_me_release
        uses: TomTonic/grype_me@v1
        with:
          scan: 'latest_release'
          description: |
            Automated nightly scan of the latest stable release tag of this plugin's code.
            This report powers the "Vulnerabilities" badge in README.
          fail-build: false
          gist-token: ${{ secrets.GIST_TOKEN }}
          gist-id: ${{ vars.GRYPE_BADGE_GIST_ID }}
          gist-filename: 'grype_me-plugin_release'
